<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sara CRM</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--navy2:#162b52;--teal:#00b4a6;--teal2:#007f76;
  --white:#fff;--off:#f5f8ff;--border:#e2e8f0;--grey:#64748b;--text:#1e293b;
  --sw:220px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--off);color:var(--text);height:100vh;overflow:hidden}
#app{display:flex;height:100vh}

/* SIDEBAR */
#sidebar{width:var(--sw);background:var(--navy);color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.s-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.s-logo h2{font-size:1.15rem;color:var(--teal);font-weight:800;letter-spacing:-.3px}
.s-logo p{font-size:.68rem;color:rgba(255,255,255,.4);margin-top:2px}
.s-sect{padding:16px 20px 6px;font-size:.62rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em}
.nav{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.6);font-size:.85rem;font-weight:500;transition:all .15s;user-select:none}
.nav:hover{background:rgba(255,255,255,.07);color:#fff}
.nav.active{background:rgba(0,180,166,.15);color:var(--teal)}
.nav-ic{font-size:.95rem;width:20px;text-align:center}
.nbadge{margin-left:auto;background:var(--teal);color:var(--navy);font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:50px}
.s-foot{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:.72rem;color:rgba(255,255,255,.35);line-height:1.5}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:14px;flex-shrink:0}
#topbar h1{font-size:1.05rem;font-weight:700;color:var(--navy);white-space:nowrap}
.searchbox{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--off);border:1px solid var(--border);border-radius:8px;padding:7px 13px;width:260px}
.searchbox input{border:none;background:transparent;outline:none;font-size:.85rem;color:var(--text);width:100%}
.tbtn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:.83rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
.tbtn:hover{background:var(--teal2)}
#content{flex:1;overflow-y:auto;padding:24px}

/* KANBAN */
#kwrap{overflow-x:auto;overflow-y:hidden;height:100%;padding:24px}
#kanban{display:flex;gap:14px;min-width:max-content;height:100%}
.kcol{width:228px;flex-shrink:0;background:var(--off);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;height:100%}
.khead{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.kdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ktitle{font-size:.8rem;font-weight:700;color:var(--navy)}
.kcount{margin-left:auto;font-size:.72rem;color:var(--grey);font-weight:600;background:var(--border);padding:2px 7px;border-radius:50px}
.kbody{padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1}
.kcol.drag-over .kbody{background:rgba(0,180,166,.06);border-radius:0 0 11px 11px}

/* CONTACT CARD */
.cc{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:11px;cursor:pointer;transition:box-shadow .15s,transform .15s;user-select:none}
.cc:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.cc.dragging{opacity:.45;transform:scale(.96)}
.cc h4{font-size:.8rem;font-weight:700;color:var(--navy);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc .ce{font-size:.7rem;color:var(--grey);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
.cc-loc{font-size:.68rem;color:var(--grey)}

/* TAGS */
.tag{display:inline-block;padding:2px 7px;border-radius:50px;font-size:.62rem;font-weight:700}
.t-unv{background:#fef3c7;color:#92400e}
.t-hiring{background:#dbeafe;color:#1e40af}
.t-won{background:#d1fae5;color:#065f46}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:15px;margin-bottom:26px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.kpi-n{font-size:2rem;font-weight:800;color:var(--teal);line-height:1}
.kpi-l{font-size:.75rem;color:var(--grey);margin-top:4px}

/* DASH GRID */
.dgrid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:20px}
@media(max-width:900px){.dgrid{grid-template-columns:1fr}}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px}
.card h3{font-size:.88rem;font-weight:700;color:var(--navy);margin-bottom:14px}

/* FUNNEL BAR */
.funnel{display:flex;border-radius:8px;overflow:hidden;margin-top:6px}
.funnel-seg{padding:10px 0;text-align:center;font-size:.68rem;font-weight:700;color:#fff;transition:flex .3s}

/* ACTIVITY */
.alist{display:flex;flex-direction:column;gap:10px}
.aitem{display:flex;gap:9px}
.adot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:5px}
.atext{font-size:.8rem;color:var(--text)}
.atime{font-size:.7rem;color:var(--grey);margin-top:1px}

/* CONTACTS TABLE */
.ctoolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{padding:5px 13px;border-radius:50px;border:1px solid var(--border);font-size:.76rem;cursor:pointer;background:var(--white);color:var(--grey);font-weight:500;transition:all .15s}
.pill.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.twrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:11px 15px;font-size:.76rem;font-weight:700;color:var(--grey);text-align:left;border-bottom:1px solid var(--border);background:var(--off);white-space:nowrap}
tbody td{padding:11px 15px;font-size:.8rem;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(0,180,166,.03);cursor:pointer}
.sbadge{display:inline-block;padding:3px 9px;border-radius:50px;font-size:.7rem;font-weight:700}

/* PANEL */
#pov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:none}
#pov.open{display:block}
#panel{position:fixed;top:0;right:0;bottom:0;width:470px;background:var(--white);z-index:101;box-shadow:-4px 0 28px rgba(0,0,0,.13);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
#panel.open{transform:translateX(0)}
.ph{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.pclose{margin-left:auto;background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--grey);padding:3px;line-height:1}
.pav{width:42px;height:42px;border-radius:9px;background:linear-gradient(135deg,var(--navy),var(--teal));display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#fff;flex-shrink:0}
.pname{font-size:.98rem;font-weight:700;color:var(--navy)}
.pemail{font-size:.78rem;color:var(--grey);margin-top:2px}
#pb{flex:1;overflow-y:auto;padding:18px 22px}
.psect{margin-bottom:22px}
.psect h4{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--grey);margin-bottom:10px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.iitem label{font-size:.7rem;color:var(--grey);display:block;margin-bottom:2px}
.iitem span{font-size:.82rem;color:var(--text);font-weight:500}
.ssel{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:.83rem;color:var(--text);background:var(--white);cursor:pointer;outline:none}
.ssel:focus{border-color:var(--teal)}
.ntarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:.83rem;resize:vertical;min-height:68px;font-family:inherit;outline:none;color:var(--text)}
.ntarea:focus{border-color:var(--teal)}
.bsm{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:7px 15px;font-size:.8rem;font-weight:600;cursor:pointer}
.bsm:hover{background:var(--teal2)}
.bghost{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 13px;font-size:.8rem;font-weight:500;cursor:pointer}
.bghost:hover{background:var(--off)}
.arow{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.abtn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--white);font-size:.77rem;font-weight:600;cursor:pointer;color:var(--text);text-decoration:none;transition:all .15s;white-space:nowrap}
.abtn:hover{background:var(--off);border-color:var(--teal);color:var(--teal)}
.abtn.pri{background:var(--teal);color:#fff;border-color:var(--teal)}
.abtn.pri:hover{background:var(--teal2)}

/* MODAL */
#mov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
#mov.open{display:flex}
#modal{background:var(--white);border-radius:14px;padding:26px;width:460px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
#modal h3{font-size:1.05rem;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:14px}
.fg label{font-size:.77rem;font-weight:600;color:var(--grey);display:block;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:.86rem;outline:none;color:var(--text);font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--teal)}
.mact{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}

.empty{text-align:center;padding:36px;color:var(--grey);font-size:.85rem}

/* EMAIL COMPOSE MODAL */
#eov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:center;justify-content:center}
#eov.open{display:flex}
#emodal{background:var(--white);border-radius:14px;width:560px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.emhd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.emhd h3{font-size:1rem;font-weight:700}
.embd{padding:20px 22px}
.emft{display:flex;justify-content:flex-end;gap:9px;padding:14px 22px;border-top:1px solid var(--border)}
.etarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.84rem;resize:vertical;min-height:200px;font-family:inherit;outline:none;color:var(--text);line-height:1.6}
.etarea:focus{border-color:var(--teal)}

/* TRACKING BADGES */
.tb{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:50px;font-size:.68rem;font-weight:700}
.tb-opened{background:#d1fae5;color:#065f46}
.tb-clicked{background:#dbeafe;color:#1e40af}
.tb-bounced{background:#fee2e2;color:#991b1b}
.tb-sent{background:#f1f5f9;color:#475569}
.tb-loading{background:#f1f5f9;color:#94a3b8}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
</style>
</head>

      <button class="tbtn" onclick="openModal()">+ Add Lead</button>
    </header>
    <div id="content"></div>
  </div>
</div>

<div id="pov" onclick="closePanel()"></div>
<div id="panel">
  <div class="ph" id="ph"></div>
  <div id="pb"></div>
</div>

<div id="mov" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h3>Add New Lead</h3>
    <div class="fg"><label>Clinic Name *</label><input id="fn" placeholder="e.g. Riverside Dental"/></div>
    <div class="fg"><label>Email *</label><input id="fe" type="email" placeholder="info@clinic.co.uk"/></div>
    <div class="fg"><label>Location</label><input id="fl" placeholder="e.g. Manchester"/></div>
    <div class="fg"><label>Stage</label><select id="fs"></select></div>
    <div class="fg"><label>Job Posting URL</label><input id="fu" type="url" placeholder="https://…"/></div>
    <div class="fg"><label>Phone</label><input id="fph" placeholder="+44 …"/></div>
    <div class="mact"><button class="bghost" onclick="closeModal()">Cancel</button><button class="bsm" onclick="saveNew()">Add Lead</button></div>
  </div>
</div>

<!-- Email Compose Modal -->
<div id="eov" onclick="if(event.target===this)closeEmail()">
  <div id="emodal">
    <div class="emhd"><h3>✉️ Send Email</h3><button class="pclose" onclick="closeEmail()">✕</button></div>
    <div class="embd">
      <div class="fg"><label>To</label><input id="eto" readonly style="background:var(--off)"/></div>
      <div class="fg"><label>Subject</label><input id="esubj" placeholder="Subject line…"/></div>
      <div class="fg"><label>Message (HTML or plain text)</label>
        <textarea class="etarea" id="ebody"></textarea>
      </div>
      <div style="font-size:.75rem;color:var(--grey);margin-top:-8px">
        Open &amp; click tracking is automatic via Brevo. Requires <strong>BREVO_API_KEY</strong> in Netlify env vars.
      </div>
    </div>
    <div class="emft">
      <button class="bghost" onclick="closeEmail()">Cancel</button>
      <button class="bsm" id="esend" onclick="sendEmail()">Send Email</button>
    </div>
  </div>
</div>

// drag/drop
function dstart(e,id){dragId=id;setTimeout(()=>{const el=document.getElementById('card-'+id);if(el)el.classList.add('dragging')},0);e.dataTransfer.effectAllowed='move'}
function dend(){if(dragId){const el=document.getElementById('card-'+dragId);if(el)el.classList.remove('dragging')}}
function dvr(e,sid){e.preventDefault();e.dataTransfer.dropEffect='move';document.getElementById('col-'+sid).classList.add('drag-over')}
function dlv(e){e.currentTarget.classList.remove('drag-over')}
function drp(e,sid){
  e.preventDefault();
  document.querySelectorAll('.kcol').forEach(c=>c.classList.remove('drag-over'));
  if(dragId==null)return;
  const c=contacts.find(x=>x.id===dragId);
  if(c&&c.stage!==sid){
    const old=gstage(c.stage),nw=gstage(sid);
    c.stage=sid;
    c.activity=c.activity||[];
    c.activity.unshift({text:`Moved: ${old.label} → ${nw.label}`,time:today()});
    save();render();
  }
  dragId=null;
}

let emailContactId=null;

const SARA_TEMPLATE=`Hi,

I noticed [CLINIC] is looking to hire a receptionist — before you go through that process, I wanted to reach out about something that might be worth a look.

We've built Sara, an AI voice receptionist for dental clinics. She answers every call (even when the desk is busy or it's after hours), books patients into your diary, and handles routine questions — working alongside your team, not replacing them.

The pitch is simple: clinics lose new patients at the phone every day. Callers don't leave voicemail, they ring the next dentist. Sara makes sure that doesn't happen.

First month is free. No long contract. Happy to show you a quick demo — link below.

[Demo: https://wonderful-meerkat-938250.netlify.app/]

Jordan`;

function openEmail(id){
  emailContactId=id;
  const c=contacts.find(x=>x.id===id);if(!c)return;
  document.getElementById('eto').value=c.email;
  document.getElementById('esubj').value=`A thought on covering phones at ${c.clinic_name}`;
  document.getElementById('ebody').value=SARA_TEMPLATE.replace('[CLINIC]',c.clinic_name);
  document.getElementById('esend').textContent='Send Email';
  document.getElementById('esend').disabled=false;
  document.getElementById('eov').classList.add('open');
}

function closeEmail(){
  document.getElementById('eov').classList.remove('open');
  emailContactId=null;
}

async function sendEmail(){
  const c=contacts.find(x=>x.id===emailContactId);if(!c)return;
  const subj=document.getElementById('esubj').value.trim();
  const body=document.getElementById('ebody').value.trim();
  if(!subj||!body){alert('Subject and message required.');return}

  const btn=document.getElementById('esend');
  btn.textContent='Sending…';btn.disabled=true;

  const html=body.includes('<')?body:body.split('\n').map(l=>l?`<p>${l}</p>`:'<br>').join('');

  try{
    const res=await fetch('/api/send-email',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to:c.email,toName:c.clinic_name,subject:subj,html,contactId:c.id}),
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Send failed');

    // store messageId & mark emailed
    c.emailsSent=c.emailsSent||[];
    c.emailsSent.push({messageId:data.messageId,subject:subj,sentAt:today(),opened:false,clicked:false});
    c.activity=c.activity||[];
    c.activity.unshift({text:`📧 Email sent: "${subj}"`,time:today()});
    if(c.stage==='new'||c.stage==='draft') chStage(c.id,'emailed');
    else{save();openPanel(c.id);}
    closeEmail();
    alert('Email sent! Tracking is active.');
  }catch(err){
    alert('Error: '+err.message);
    btn.textContent='Send Email';btn.disabled=false;
  }
}

// ── EMAIL STATS / TRACKING ──
async function fetchEmailStats(contactId){
  try{
    const res=await fetch(`/api/email-stats?contactId=${contactId}`);
    if(!res.ok)return null;
    return await res.json();
  }catch{return null}
}

function trackingHTML(c){
  if(!c.emailsSent||c.emailsSent.length===0) return '';
  return`<div class="psect"><h4>Email Tracking</h4>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${c.emailsSent.map((e,i)=>`
      <div style="background:var(--off);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
        <div style="font-size:.78rem;font-weight:600;margin-bottom:5px">${e.subject||'Email '+(i+1)}</div>
        <div style="font-size:.7rem;color:var(--grey);margin-bottom:6px">${e.sentAt}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span class="tb tb-sent">✉ Sent</span>
          <span class="tb ${e.opened?'tb-opened':'tb-loading'}" id="tr-open-${c.id}-${i}">${e.opened?'👁 Opened':'⏳ Not opened'}</span>
          <span class="tb ${e.clicked?'tb-clicked':'tb-loading'}" id="tr-click-${c.id}-${i}">${e.clicked?'🖱 Clicked':'— No click'}</span>
          ${e.bounced?'<span class="tb tb-bounced">⚠ Bounced</span>':''}
        </div>
        ${e.messageId?`<button class="abtn" style="margin-top:8px;font-size:.7rem" onclick="refreshStats(${c.id},${i})">↻ Refresh</button>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}

async function refreshStats(contactId,idx){
  const c=contacts.find(x=>x.id===contactId);if(!c||!c.emailsSent[idx])return;
  const e=c.emailsSent[idx];
  const data=await fetchEmailStats(contactId);
  if(!data||!data.emails)return;
  const match=data.emails.find(m=>m.messageId===e.messageId)||data.emails[idx];
  if(match){
    e.opened=match.opened;
    e.clicked=match.clicked;
    e.bounced=match.bounced;
    save();openPanel(contactId);
  }
}
</script>
